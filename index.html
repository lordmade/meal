<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trendy Kids Fashion UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* Base system font for a clean, minimalist aesthetic */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f1f5f9; /* Subtle background to make the mobile frame pop on desktop */
        }
        
        /* Mobile container styling */
        .mobile-container {
            max-width: 414px; /* iPhone Max width */
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            overflow-x: hidden;
        }

        /* Hide scrollbar for horizontal categories */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Smooth, high-end shadows */
        .shadow-soft {
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="antialiased text-gray-800">

    <div class="mobile-container pb-24">
        
        <header class="flex justify-between items-center p-6 pt-10 bg-white">
            <div>
                <p class="text-xs text-gray-400 font-medium mb-1">Good Morning 👋</p>
                <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Discover Fashion</h1>
            </div>
            
            <div class="relative cursor-pointer">
                <div class="w-11 h-11 bg-blue-50 rounded-full flex items-center justify-center text-blue-600 shadow-sm border border-blue-100">
                    <i class="fa-solid fa-user text-lg"></i>
                </div>
                <span class="absolute top-0 right-0 w-3 h-3 bg-red-500 border-2 border-white rounded-full"></span>
            </div>
        </header>

        <div class="px-6 mb-6">
            <div class="flex items-center bg-gray-50 rounded-2xl p-2 shadow-inner border border-gray-100">
                <i class="fa-solid fa-magnifying-glass text-gray-400 ml-3"></i>
                <input type="text" placeholder="Search clothes, shoes..." class="bg-transparent border-none outline-none w-full ml-3 text-sm placeholder-gray-400 font-medium py-2">
                <button class="bg-blue-600 w-10 h-10 rounded-xl flex items-center justify-center text-white shadow-md hover:bg-blue-700 transition">
                    <i class="fa-solid fa-sliders text-sm"></i>
                </button>
            </div>
        </div>

        <div class="px-6 mb-8">
            <div class="bg-gradient-to-r from-blue-500 to-indigo-600 rounded-3xl p-6 text-white flex justify-between items-center shadow-soft relative overflow-hidden">
                <div class="z-10 relative">
                    <span class="bg-white/20 px-3 py-1 rounded-full text-[10px] uppercase font-bold tracking-wider backdrop-blur-md mb-3 inline-block">Promo</span>
                    <h2 class="text-3xl font-bold mb-1">50% OFF</h2>
                    <p class="text-xs text-blue-100 mb-4 font-medium">On New Kids Collection</p>
                    <button class="bg-white text-gray-900 px-5 py-2.5 rounded-full text-xs font-bold shadow-lg hover:bg-gray-50 transition">Shop Now</button>
                </div>
                
                <div class="absolute -right-6 -top-6 w-32 h-32 bg-white opacity-10 rounded-full blur-2xl"></div>
                <div class="absolute bottom-[-20px] right-4 w-24 h-24 bg-white opacity-10 rounded-full blur-xl"></div>
                <i class="fa-solid fa-shirt absolute right-4 bottom-4 text-7xl text-white opacity-20 transform rotate-12"></i>
            </div>
        </div>

        <div class="pl-6 mb-8">
            <div class="flex space-x-3 overflow-x-auto no-scrollbar pr-6 pb-2">
                <button class="bg-gray-900 text-white px-6 py-2.5 rounded-full text-sm font-semibold shadow-md flex-shrink-0 transition">All</button>
                <button class="bg-white text-gray-500 border border-gray-200 px-6 py-2.5 rounded-full text-sm font-semibold hover:border-gray-300 hover:text-gray-900 transition flex-shrink-0">Boys</button>
                <button class="bg-white text-gray-500 border border-gray-200 px-6 py-2.5 rounded-full text-sm font-semibold hover:border-gray-300 hover:text-gray-900 transition flex-shrink-0">Girls</button>
                <button class="bg-white text-gray-500 border border-gray-200 px-6 py-2.5 rounded-full text-sm font-semibold hover:border-gray-300 hover:text-gray-900 transition flex-shrink-0">Shoes</button>
                <button class="bg-white text-gray-500 border border-gray-200 px-6 py-2.5 rounded-full text-sm font-semibold hover:border-gray-300 hover:text-gray-900 transition flex-shrink-0">Toys</button>
            </div>
        </div>

        <div class="px-6 mb-4">
            <div class="flex justify-between items-center mb-5">
                <h3 class="text-xl font-bold text-gray-900">Popular Items</h3>
                <a href="#" class="text-sm text-blue-600 font-semibold hover:underline">See All</a>
            </div>
            
            <div class="grid grid-cols-2 gap-5">
                
                <div class="bg-white rounded-3xl p-3 shadow-soft border border-gray-50 relative group cursor-pointer">
                    <button class="absolute top-5 right-5 z-10 w-8 h-8 bg-white/90 backdrop-blur-md rounded-full flex items-center justify-center text-red-500 shadow-sm transition hover:scale-110">
                        <i class="fa-solid fa-heart text-xs"></i>
                    </button>
                    <div class="bg-gray-100 rounded-2xl h-44 mb-4 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1519241047957-be31d7379a5d?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Boy Outfit" class="object-cover h-full w-full group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="px-1">
                        <h4 class="font-bold text-gray-900 text-sm mb-1 truncate">Denim Overalls</h4>
                        <p class="text-xs text-gray-400 mb-3">Boy's Fashion</p>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-lg text-gray-900">$45.<span class="text-sm">00</span></span>
                            <button class="bg-gray-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs hover:bg-blue-600 transition shadow-md">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="bg-white rounded-3xl p-3 shadow-soft border border-gray-50 relative group cursor-pointer">
                    <button class="absolute top-5 right-5 z-10 w-8 h-8 bg-white/90 backdrop-blur-md rounded-full flex items-center justify-center text-gray-300 shadow-sm transition hover:scale-110">
                        <i class="fa-regular fa-heart text-xs"></i>
                    </button>
                    <div class="bg-orange-50 rounded-2xl h-44 mb-4 overflow-hidden relative">
                        <img src="https://images.unsplash.com/photo-1622290291468-a28f7a7dc6a8?ixlib=rb-4.0.3&auto=format&fit=crop&w=400&q=80" alt="Girl Dress" class="object-cover h-full w-full group-hover:scale-105 transition duration-500">
                    </div>
                    <div class="px-1">
                        <h4 class="font-bold text-gray-900 text-sm mb-1 truncate">Summer Yellow Dress</h4>
                        <p class="text-xs text-gray-400 mb-3">Girl's Fashion</p>
                        <div class="flex justify-between items-center">
                            <span class="font-bold text-lg text-gray-900">$32.<span class="text-sm">00</span></span>
                            <button class="bg-gray-900 text-white w-8 h-8 rounded-full flex items-center justify-center text-xs hover:bg-blue-600 transition shadow-md">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-gray-100 pb-safe pt-2 px-6 shadow-[0_-10px_40px_rgba(0,0,0,0.04)] z-50 rounded-t-3xl">
            <div class="flex justify-between items-center py-3">
                <a href="#" class="flex flex-col items-center text-blue-600 w-12">
                    <i class="fa-solid fa-house text-xl mb-1.5"></i>
                    <span class="text-[9px] font-bold uppercase tracking-wider">Home</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition w-12">
                    <i class="fa-solid fa-border-all text-xl mb-1.5"></i>
                    <span class="text-[9px] font-bold uppercase tracking-wider">Catalog</span>
                </a>
                
                <div class="relative -top-6">
                    <div class="w-16 h-16 bg-gray-900 text-white rounded-full flex items-center justify-center shadow-xl shadow-gray-900/30 border-4 border-white cursor-pointer hover:bg-blue-600 hover:shadow-blue-600/30 transition-all duration-300">
                        <i class="fa-solid fa-bag-shopping text-2xl"></i>
                        <span class="absolute top-0 right-0 w-4 h-4 bg-red-500 text-white text-[9px] font-bold flex items-center justify-center rounded-full border-2 border-gray-900">2</span>
                    </div>
                </div>
                
                <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition w-12">
                    <i class="fa-regular fa-heart text-xl mb-1.5"></i>
                    <span class="text-[9px] font-bold uppercase tracking-wider">Saved</span>
                </a>
                <a href="#" class="flex flex-col items-center text-gray-400 hover:text-gray-900 transition w-12">
                    <i class="fa-regular fa-bell text-xl mb-1.5"></i>
                    <span class="text-[9px] font-bold uppercase tracking-wider">Alerts</span>
                </a>
            </div>
        </nav>

    </div>

</body>
</html>
